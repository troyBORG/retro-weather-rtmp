services:
  rtsp:
    image: bluenviron/mediamtx:1
    environment:
      - MTX_RTSPTRANSPORTS=tcp
    ports:
      - "8554:8554"
    restart: unless-stopped

  streamer:
    build: ./streamer
    environment:
      - DISPLAY=:99
      # Virtual display size, FFmpeg capture size, and Chromium viewport/window (keep in sync).
      - WIDTH=1280
      - HEIGHT=960
      - DEPTH=16
      - FPS=30
      # ZIP comes from `.env` (gitignored). Default below if no .env.
      - LOCATION=${LOCATION:-60601}
      # Optional override; if empty, streamer derives IANA TZ from US ZIP (LOCATION).
      - TZ=${TZ:-}
      - RTSP_URL=rtsp://rtsp:8554/retro
      - TARGET_URL=https://weather.com/retro/
    depends_on:
      - rtsp
    ipc: host
    init: true
    restart: unless-stopped
