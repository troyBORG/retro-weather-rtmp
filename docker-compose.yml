services:
  rtsp:
    image: bluenviron/mediamtx:1
    environment:
      - MTX_RTSPTRANSPORTS=tcp
    ports:
      - "8554:8554"
    restart: unless-stopped

  streamer:
    build: ./streamer
    environment:
      - DISPLAY=:99
      # Virtual display size, FFmpeg capture size, and Chromium viewport/window (keep in sync).
      - WIDTH=640
      - HEIGHT=480
      - DEPTH=16
      - FPS=30
      # ZIP comes from `.env` (gitignored). Default below if no .env.
      - LOCATION=${LOCATION:-60601}
      # Optional override; if empty, streamer derives IANA TZ from US ZIP (LOCATION).
      - TZ=${TZ:-}
      - RTSP_URL=rtsp://rtsp:8554/retro
      # Override in `.env` (e.g. WeatherStar). Default: Weather.com RetroCast.
      - TARGET_URL=${TARGET_URL:-https://weather.com/retro/}
      - SKIP_START_RETROCAST_BUTTON=${SKIP_START_RETROCAST_BUTTON:-false}
      - SKIP_UNMUTE=${SKIP_UNMUTE:-false}
    depends_on:
      - rtsp
    ipc: host
    init: true
    restart: unless-stopped
